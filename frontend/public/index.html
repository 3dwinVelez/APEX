<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="APEX ERP - Gestiona facil, crece rapido" />
    <title>APEX — Gestiona facil, crece rapido</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; -webkit-text-size-adjust: 100%; }
      input, button, select, textarea {
        font-size: 16px !important; /* Previene zoom en iOS al hacer focus */
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
      @media (max-width: 768px) {
        .apex-grid-2 { grid-template-columns: 1fr !important; }
        .apex-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
        .apex-hide-mobile { display: none !important; }
        .apex-full-mobile { width: 100% !important; min-width: unset !important; }
        .apex-padding-mobile { padding: 12px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
